<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#2d6a4f">
  <title>Plant Scout - CGP</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- ===== TOP BAR ===== -->
  <div class="top-bar" id="topBar">
    <h1>
      <span>&#127793;</span> Plant Scout
    </h1>
    <div class="progress-text" id="progressText">0 / 123 reviewed</div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width: 0%"></div></div>
    <div class="search-wrap">
      <span class="search-icon">&#128269;</span>
      <input type="text" id="searchInput" placeholder="Search plants..." autocomplete="off">
      <button class="clear-btn" id="clearSearch">&times;</button>
    </div>
    <div class="filter-row" id="categoryFilters"></div>
  </div>

  <!-- ===== STATUS FILTER ===== -->
  <div class="status-row" id="statusFilters">
    <button class="status-chip active" data-status="all">All</button>
    <button class="status-chip" data-status="unreviewed">Unreviewed</button>
    <button class="status-chip" data-status="love">Love</button>
    <button class="status-chip" data-status="maybe">Maybe</button>
    <button class="status-chip" data-status="skip">Skip</button>
  </div>

  <!-- ===== MAIN VIEWS ===== -->

  <!-- Plant List -->
  <div class="view active" id="viewList">
    <div class="plant-list" id="plantList"></div>
  </div>

  <!-- Favorites -->
  <div class="view" id="viewFavorites">
    <div class="plant-list" id="favList" style="padding-top:12px"></div>
  </div>

  <!-- Park Map -->
  <div class="view" id="viewZones">
    <div class="park-map-view" id="zoneList"></div>
  </div>

  <!-- Export -->
  <div class="view" id="viewExport">
    <div class="export-section" style="padding-top:20px">
      <h2 style="font-size:1.2rem;margin-bottom:6px">&#128230; Export Your Data</h2>
      <p style="font-size:0.85rem;color:#6c757d;margin-bottom:20px">
        Save your field notes, ratings, and photos to transfer to your laptop.
      </p>
      <button class="export-btn primary" id="btnExportJSON">&#128229; Download Full Export (JSON)</button>
      <button class="export-btn secondary" id="btnCopySummary">&#128203; Copy Summary to Clipboard</button>
      <button class="export-btn tertiary" id="btnShareExport">&#128228; Share via Android Share</button>
      <div id="exportStats" style="margin-top:20px;font-size:0.85rem;color:#6c757d"></div>
    </div>
  </div>

  <!-- ===== PLANT DETAIL OVERLAY ===== -->
  <div class="detail-overlay" id="detailOverlay">
    <div class="detail-header">
      <button class="back-btn" id="detailBack">&#8592;</button>
      <div class="title">
        <h2 id="detailName"></h2>
        <div class="botanical-sub" id="detailBotanical"></div>
      </div>
      <div class="rating-dot" id="detailDot"></div>
    </div>
    <div class="detail-body">
      <img class="detail-ref-photo" id="detailRefPhoto" alt="Reference photo" style="display:none">

      <div class="detail-section">
        <h3>Plant Info</h3>
        <dl class="detail-meta">
          <dt>Symbol</dt><dd id="detailSymbol"></dd>
          <dt>Category</dt><dd id="detailCategory"></dd>
          <dt>Subcategory</dt><dd id="detailSubcategory"></dd>
          <dt>Size</dt><dd id="detailSize"></dd>
        </dl>
      </div>

      <div class="detail-section find-in-park" id="findInParkSection" style="display:none">
        <h3>&#128205; Find in Park</h3>
        <div class="park-locations" id="parkLocations"></div>
        <a class="cgp-link" id="cgpLink" href="#" target="_blank" rel="noopener">View on CGP website &rarr;</a>
      </div>

      <div class="detail-section">
        <h3>Research Notes</h3>
        <div class="detail-notes-csv" id="detailCsvNotes"></div>
      </div>

      <div class="detail-section">
        <h3>Your Rating</h3>
        <div class="rating-buttons">
          <button class="rating-btn love" data-rating="love">&#128154; Love</button>
          <button class="rating-btn maybe" data-rating="maybe">&#129300; Maybe</button>
          <button class="rating-btn skip" data-rating="skip">&#128683; Skip</button>
        </div>
      </div>

      <div class="detail-section">
        <h3>Park Zone</h3>
        <select class="zone-select" id="detailZone">
          <option value="">-- Where did you find it? --</option>
          <optgroup label="🏡 Example Landscapes">
            <option value="1 - A Desert with Altitude">1 · A Desert with Altitude</option>
            <option value="2 - Harvest Haven">2 · Harvest Haven</option>
            <option value="3 - Prudent Perennials">3 · Prudent Perennials</option>
            <option value="4 - Traditional Yet Thrifty">4 · Traditional Yet Thrifty</option>
            <option value="5 - Tradition with a Twist">5 · Tradition with a Twist</option>
            <option value="6 - Waterwise Woodlands">6 · Waterwise Woodlands</option>
          </optgroup>
          <optgroup label="🌿 Localscapes">
            <option value="7 - Paths & Pollinators">7 · Paths &amp; Pollinators</option>
            <option value="8 - Localscapes 5 Steps">8 · Localscapes 5 Steps</option>
            <option value="9 - Park Strip Examples">9 · Park Strip Examples</option>
          </optgroup>
          <optgroup label="📐 Design">
            <option value="10 - Survey First">10 · Survey First</option>
            <option value="11 - Initial Analysis">11 · Initial Analysis</option>
            <option value="12 - Climate Control">12 · Climate Control</option>
            <option value="13 - Scene or Unseen">13 · Scene or Unseen</option>
            <option value="14 - The Produce Section">14 · The Produce Section</option>
            <option value="15 - Hardscape Exhibit">15 · Hardscape Exhibit</option>
          </optgroup>
          <optgroup label="🌱 Planting">
            <option value="16 - Perfect Planting">16 · Perfect Planting</option>
            <option value="17 - Marvelous Mulch">17 · Marvelous Mulch</option>
            <option value="18 - First Amendments">18 · First Amendments</option>
            <option value="19 - Signature Soils">19 · Signature Soils</option>
            <option value="20 - Avoiding Erosion">20 · Avoiding Erosion</option>
            <option value="21 - Nursery Shopping">21 · Nursery Shopping</option>
          </optgroup>
          <optgroup label="💧 Irrigation">
            <option value="22 - Turf Tips">22 · Turf Tips</option>
            <option value="23 - Turf Alternatives">23 · Turf Alternatives</option>
            <option value="24 - Irrigation Hardware">24 · Irrigation Hardware</option>
            <option value="25 - Watering Drop by Drop">25 · Watering Drop by Drop</option>
            <option value="26 - Puddle Trouble">26 · Puddle Trouble</option>
            <option value="27 - The Right Way to Spray">27 · The Right Way to Spray</option>
            <option value="28 - Mountain to Tap">28 · Mountain to Tap</option>
            <option value="29 - Effortless Irrigation">29 · Effortless Irrigation</option>
          </optgroup>
          <optgroup label="🔧 Maintenance">
            <option value="30 - Moving Day">30 · Moving Day</option>
            <option value="31 - Outsmart Invaders">31 · Outsmart Invaders</option>
            <option value="32 - Compost Salad">32 · Compost Salad</option>
            <option value="33 - Rain Gardening">33 · Rain Gardening</option>
            <option value="34 - Backyard Makeover">34 · Backyard Makeover</option>
            <option value="35 - Maintenance Matters">35 · Maintenance Matters</option>
            <option value="36 - Rain Water Harvesting">36 · Rain Water Harvesting</option>
          </optgroup>
          <optgroup label="─────────────">
            <option value="General / Other">General / Other</option>
            <option value="Not found at CGP">Not found at CGP</option>
          </optgroup>
        </select>
      </div>

      <div class="detail-section">
        <h3>Your Notes</h3>
        <textarea class="notes-textarea" id="detailNotes" placeholder="What did you think? Size, color, placement ideas..."></textarea>
      </div>

      <div class="detail-section">
        <h3>Your Photos</h3>
        <div class="photo-grid" id="detailPhotos">
          <label class="photo-add-btn">
            <span class="camera-icon">&#128247;</span>
            <span>Add Photo</span>
            <input type="file" accept="image/*" capture="environment" id="photoInput" style="display:none">
          </label>
        </div>
      </div>
    </div>
  </div>

  <!-- ===== BOTTOM NAV ===== -->
  <nav class="bottom-nav">
    <button class="nav-btn active" data-view="viewList">
      <span class="nav-icon">&#127807;</span>
      <span>Plants</span>
    </button>
    <button class="nav-btn" data-view="viewFavorites">
      <span class="nav-icon">&#128154;</span>
      <span>Favorites</span>
    </button>
    <button class="nav-btn" data-view="viewZones">
      <span class="nav-icon">&#128507;</span>
      <span>Park Map</span>
    </button>
    <button class="nav-btn" data-view="viewExport">
      <span class="nav-icon">&#128230;</span>
      <span>Export</span>
    </button>
  </nav>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script src="park_locations.js"></script>
  <script src="app.js"></script>
</body>
</html>
